services:
  frontend:
    build: .
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - BACKEND_URL=http://backend:80
    depends_on:
      - backend

  backend:
    build:
      context: ../rest_api_php
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PWD: root
      DB_DSN: mysql:host=db;dbname=rest_api;charset=utf8mb4
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: rest_api
    ports:
      - "13306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../rest_api_php/share/sql/rest_api.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend-ci:
    build: .
    volumes:
      - .:/app
      - /app/node_modules
    profiles:
      - ci

volumes:
  mysql_data:
